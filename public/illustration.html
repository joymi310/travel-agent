<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wayfindr — World Journey</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh;
  background: #2A2018;
  display: flex;
  align-items: center;
  justify-content: center;
}
svg { max-width: 100%; height: auto; display: block; }

/* CLOUDS */
@keyframes drift {
  from { transform: translateX(-360px); }
  to   { transform: translateX(1360px); }
}
.cl-a { animation: drift 55s -14s linear infinite; }
.cl-b { animation: drift 72s -40s linear infinite; }
.cl-c { animation: drift 46s  -8s linear infinite; }

/* SUN */
@keyframes sunbreathe {
  0%,100% { opacity:.92; transform:scale(1);    }
  50%     { opacity:1;   transform:scale(1.05); }
}
@keyframes rayspin { to { transform:rotate(360deg); } }
.sun-disc { transform-origin:1115px 72px; animation:sunbreathe 6s ease-in-out infinite; }
.sun-rays { transform-origin:1115px 72px; animation:rayspin 30s linear infinite; }

/* LANDMARK ARRIVAL PULSE */
@keyframes glow {
  0%,100% { transform:scale(1);    filter:drop-shadow(0 0  0px rgba(194,113,79,0));   }
  7%      { transform:scale(1.55); filter:drop-shadow(0 0 12px rgba(194,113,79,.95)); }
  20%     { transform:scale(1);    filter:drop-shadow(0 0  0px rgba(194,113,79,0));   }
}
.lm { transform-box:fill-box; transform-origin:center bottom; animation:glow 20s ease-in-out infinite; }
.lm-0 { animation-delay:  0.0s; }
.lm-1 { animation-delay:  2.0s; }
.lm-2 { animation-delay:  4.8s; }
.lm-3 { animation-delay:  6.1s; }
.lm-4 { animation-delay:  8.0s; }
.lm-5 { animation-delay:  9.4s; }
.lm-6 { animation-delay: 11.0s; }
.lm-7 { animation-delay: 12.8s; }
</style>
</head>
